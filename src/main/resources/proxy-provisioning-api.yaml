openapi: 3.0.3
info:
  title: Proxy Provisioning API
  description: |
    API for provisioning and managing SaaS proxy instances.
    Customer identification is done via X-API-Key header.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - apiKey: []

paths:
  /api/v1/proxies:
    post:
      summary: Provision a new proxy
      description: Creates and provisions a new proxy instance
      operationId: provisionProxy
      tags:
        - Proxy Provisioning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProxyProvisioningRequest'
      responses:
        '201':
          description: Proxy provisioned successfully
        '400':
          description: Invalid request
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Proxy already exists

  /api/v1/proxies/{proxyCode}/installation:
    get:
      summary: Get proxy installation instructions
      description: Returns installation instructions for an existing proxy in the specified format
      operationId: getInstallationInstructions
      tags:
        - Proxy Provisioning
      parameters:
        - $ref: '#/components/parameters/ProxyCode'
        - name: format
          in: query
          required: true
          description: Installation format
          schema:
            type: string
            enum:
              - helm
              - curl
              - terraform
              - docker-compose
            example: helm
      responses:
        '200':
          description: Installation instructions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallationInstructions'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Proxy not found

  /api/v1/proxies/{proxyCode}:
    delete:
      summary: Decommission a proxy
      description: Removes and decommissions an existing proxy instance
      operationId: decommissionProxy
      tags:
        - Proxy Provisioning
      parameters:
        - $ref: '#/components/parameters/ProxyCode'
      responses:
        '204':
          description: Proxy decommissioned successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Proxy not found

  /api/v1/queues:
    post:
      summary: Provision a queue
      description: >
        Creates a durable queue with a binding to the specified exchange.
        Idempotent — re-declaring with identical arguments is a no-op.
      operationId: provisionQueue
      tags:
        - Queue Provisioning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueueRequest'
      responses:
        '201':
          description: Queue created (or already exists with identical arguments)
        '400':
          description: Invalid request — missing required field
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Queue already exists with different arguments

  /api/v1/queues/{name}:
    delete:
      summary: Delete a queue
      description: >
        Deletes the queue and its bindings.
        Idempotent — returns 204 even if the queue does not exist.
      operationId: deleteQueue
      tags:
        - Queue Provisioning
      parameters:
        - $ref: '#/components/parameters/QueueName'
      responses:
        '204':
          description: Queue deleted (or did not exist)
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key for customer authentication. Required for all API calls.
        The server identifies the customer based on this key.

  responses:
    Unauthorized:
      description: Invalid or missing X-API-Key header

  parameters:
    ProxyCode:
      name: proxyCode
      in: path
      required: true
      description: Unique proxy code identifier
      schema:
        type: string
        example: MY_PROXY_1

    QueueName:
      name: name
      in: path
      required: true
      description: Queue name
      schema:
        type: string
        example: core-0

  schemas:
    ProxyProvisioningRequest:
      type: object
      description: Request for provisioning a new proxy
      required:
        - proxyCode
      properties:
        proxyCode:
          type: string
          description: Unique proxy identifier
          example: MY_PROXY_1

    InstallationInstructions:
      type: object
      description: Pre-rendered installation instructions
      required:
        - command
      properties:
        command:
          $ref: '#/components/schemas/Command'

    Command:
      type: object
      description: Command specification with the rendered shell command
      required:
        - shell
      properties:
        shell:
          type: string
          description: Fully rendered shell command ready for execution
          example: helm install my-proxy oci://registry.example.com/charts/proxy --version 1.0.0 --namespace default --wait --atomic --set config.url=https://api.example.com

    QueueRequest:
      type: object
      description: Request for provisioning a generic queue with a binding to an exchange
      required:
        - name
        - exchange
        - routingKey
      properties:
        name:
          type: string
          description: Queue name (RabbitMQ) or subscription name (ServiceBus)
          example: core-0
        exchange:
          type: string
          description: Exchange (RabbitMQ) or topic (ServiceBus) to bind under
          example: czertainly-proxy
        routingKey:
          type: string
          description: Binding routing key (RabbitMQ) or SQL filter pattern (ServiceBus)
          example: proxymessage.*.core-0
        properties:
          type: object
          additionalProperties: {}
          description: Broker-specific queue arguments (e.g. x-expires, x-message-ttl, x-max-length)
          example:
            x-expires: 1800000
